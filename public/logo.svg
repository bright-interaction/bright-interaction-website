<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" fill="none">
  <defs>
    <!-- Teal gradient for bulb -->
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="30%" style="stop-color:#0891B2"/>
      <stop offset="70%" style="stop-color:#0E7490"/>
      <stop offset="100%" style="stop-color:#155E75"/>
    </linearGradient>
    <!-- Darker teal for depth -->
    <linearGradient id="tealDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E7490"/>
      <stop offset="100%" style="stop-color:#155E75"/>
    </linearGradient>
  </defs>

  <!-- Light rays -->
  <g stroke="#0E7490" stroke-width="3" stroke-linecap="round">
    <!-- Top ray -->
    <line x1="60" y1="8" x2="60" y2="20"/>
    <!-- Top-left rays -->
    <line x1="32" y1="22" x2="40" y2="32"/>
    <line x1="18" y1="42" x2="28" y2="48"/>
    <!-- Top-right rays -->
    <line x1="88" y1="22" x2="80" y2="32"/>
    <line x1="102" y1="42" x2="92" y2="48"/>
    <!-- Side rays -->
    <line x1="12" y1="65" x2="24" y2="65"/>
    <line x1="108" y1="65" x2="96" y2="65"/>
    <!-- Bottom side rays -->
    <line x1="20" y1="88" x2="30" y2="82"/>
    <line x1="100" y1="88" x2="90" y2="82"/>
  </g>

  <!-- Main bulb shape -->
  <path d="M60 25
           C38 25 28 42 28 60
           C28 75 35 85 42 95
           L42 105
           L78 105
           L78 95
           C85 85 92 75 92 60
           C92 42 82 25 60 25Z"
        fill="url(#tealGradient)"
        stroke="#155E75"
        stroke-width="1"/>

  <!-- Puzzle piece outlines -->
  <g stroke="#083344" stroke-width="1.5" fill="none">
    <!-- Horizontal puzzle lines -->
    <path d="M32 50 L45 50 C45 45 55 45 55 50 L75 50 C75 45 85 45 85 50 L88 50"/>
    <path d="M30 70 L42 70 C42 65 52 65 52 70 L68 70 C68 75 78 75 78 70 L90 70"/>
    <path d="M35 90 L48 90 C48 85 58 85 58 90 L72 90"/>

    <!-- Vertical puzzle lines -->
    <path d="M50 28 L50 45 C45 45 45 55 50 55 L50 68 C55 68 55 78 50 78 L50 95"/>
    <path d="M70 30 L70 48 C75 48 75 58 70 58 L70 72 C65 72 65 82 70 82 L70 95"/>
  </g>

  <!-- Circuit patterns inside puzzle pieces -->
  <g stroke="#062F3D" stroke-width="1.2" fill="none">
    <!-- Circuit traces -->
    <path d="M38 55 L44 55 L44 62 L50 62"/>
    <path d="M62 40 L62 48 L70 48"/>
    <path d="M55 58 L55 65 L48 65 L48 75"/>
    <path d="M72 55 L78 55 L78 62"/>
    <path d="M65 72 L65 80 L58 80"/>
    <path d="M40 78 L46 78 L46 85"/>
    <path d="M75 75 L80 75 L80 82"/>

    <!-- Circuit nodes (dots) -->
    <circle cx="44" cy="55" r="2" fill="#062F3D"/>
    <circle cx="62" cy="48" r="2" fill="#062F3D"/>
    <circle cx="55" cy="65" r="2" fill="#062F3D"/>
    <circle cx="78" cy="55" r="2" fill="#062F3D"/>
    <circle cx="65" cy="80" r="2" fill="#062F3D"/>
    <circle cx="46" cy="78" r="2" fill="#062F3D"/>
    <circle cx="80" cy="75" r="2" fill="#062F3D"/>

    <!-- Center gear/cog -->
    <circle cx="60" cy="60" r="6" stroke="#062F3D" stroke-width="1.5" fill="none"/>
    <circle cx="60" cy="60" r="2.5" fill="#062F3D"/>
  </g>

  <!-- Bulb base/screw -->
  <rect x="42" y="105" width="36" height="8" rx="2" fill="#4A4A4A" stroke="#333" stroke-width="0.5"/>
  <rect x="45" y="113" width="30" height="7" rx="2" fill="#3A3A3A" stroke="#2A2A2A" stroke-width="0.5"/>
  <rect x="48" y="120" width="24" height="6" rx="2" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="0.5"/>

  <!-- Screw threads -->
  <line x1="45" y1="116" x2="75" y2="116" stroke="#555" stroke-width="0.5"/>
  <line x1="48" y1="123" x2="72" y2="123" stroke="#444" stroke-width="0.5"/>

  <!-- Subtle shadow under bulb -->
  <ellipse cx="60" cy="132" rx="15" ry="3" fill="#000" opacity="0.2"/>
</svg>
