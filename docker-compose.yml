services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bright-interaction-website
    restart: unless-stopped
    ports:
      - "3333:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # Security hardening
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777,size=10M
      - /var/run/openresty:mode=755,size=1M
      - /usr/local/openresty/nginx/client_body_temp:mode=755,size=10M
      - /usr/local/openresty/nginx/proxy_temp:mode=755,size=10M
      - /usr/local/openresty/nginx/fastcgi_temp:mode=755,size=10M
      - /usr/local/openresty/nginx/uwsgi_temp:mode=755,size=10M
      - /usr/local/openresty/nginx/scgi_temp:mode=755,size=10M
    networks:
      - proxy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  proxy:
    external: true

