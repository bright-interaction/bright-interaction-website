<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafaf9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative circle -->
  <circle cx="1100" cy="100" r="200" fill="#0891B2" fill-opacity="0.08"/>
  <circle cx="100" cy="530" r="150" fill="#0891B2" fill-opacity="0.04"/>

  <!-- Logo -->
  <rect x="80" y="80" width="80" height="80" rx="16" fill="#0891B2"/>
  <text x="120" y="140" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">B</text>

  <!-- Company name -->
  <text x="180" y="135" font-family="Georgia, serif" font-size="36" font-weight="600" fill="#18181b">Bright</text>
  <text x="310" y="135" font-family="Georgia, serif" font-size="36" font-weight="600" fill="#0891B2">Interaction</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#18181b">The Infrastructure Firm</text>

  <!-- Subheadline -->
  <text x="80" y="360" font-family="Arial, sans-serif" font-size="32" fill="#52525b">Digital Sovereignty · Secure Infrastructure</text>
  <text x="80" y="405" font-family="Arial, sans-serif" font-size="32" fill="#52525b">Workflow Automation · Multi-layered Security</text>

  <!-- Bottom accent line -->
  <rect x="80" y="500" width="200" height="4" rx="2" fill="#0891B2"/>

  <!-- URL -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="24" fill="#a1a1aa">brightinteraction.com</text>
</svg>
